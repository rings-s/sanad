# fly.toml — Sanad Django/DRF API on Fly.io
#
# Deploy quickstart (run from the repo root):
#   fly apps create sanad-api                 # or edit `app` below to a free name
#   fly mpg create --region fra               # managed Postgres → note the cluster id
#   fly mpg attach <cluster-id> -a sanad-api  # sets the DATABASE_URL secret
#   fly redis create                          # Upstash Redis → copy the redis:// URL
#   ./scripts/fly-secrets.sh                  # sets the remaining secrets (see that file)
#   fly deploy
#
# The release_command runs migrations before each new version goes live.

app = "sanad-api"
primary_region = "fra"

[build]
  dockerfile = "Dockerfile"

[deploy]
  release_command = "python manage.py migrate --noinput"
  strategy = "rolling"

[env]
  DJANGO_SETTINGS_MODULE = "backend.settings.production"
  PORT = "8000"

[processes]
  # 2 uvicorn workers fits comfortably in 512MB; scale with `fly scale`.
  # Absolute path to the venv binary — a [processes] override isn't resolved
  # against the image's PATH, so `gunicorn` alone fails to spawn.
  web = "/app/.venv/bin/gunicorn backend.asgi:application --worker-class uvicorn.workers.UvicornWorker --workers 2 --bind 0.0.0.0:8000 --timeout 60 --keep-alive 5 --access-logfile - --error-logfile -"

[http_service]
  internal_port = 8000
  force_https = true            # Fly terminates TLS and forwards X-Forwarded-Proto=https
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 1
  processes = ["web"]

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
  processes = ["web"]
